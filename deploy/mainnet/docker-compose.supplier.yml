# deploy/mainnet/docker-compose.supplier.yml — Supplier — MAINNET
#
# Mirrors the testnet supplier compose, with these differences:
#   - container_name + project name use the marketplace-mainnet- prefix
#   - No apex-net join: the mainnet host reaches ogmios via the public HTTPS
#     endpoint (https://ogmios.vector.mainnet.apexfusion.org) supplied by
#     supplier/.env — same pattern as the mainnet buyer + indexer.
#   - Traefik router name + Host rule drop the `testnet.` infix
#
# Pre-flight networks (must already exist):
#   docker network create marketplace-mainnet-net   # one-shot
#   # traefik-net                                    is created by the Traefik project

name: marketplace-mainnet-supplier

services:
  supplier:
    build:
      context: ../..
      dockerfile: supplier/Dockerfile
    container_name: marketplace-mainnet-supplier
    restart: unless-stopped
    env_file:
      - path: ../../supplier/.env
        required: false
    environment:
      OLLAMA_URL: http://marketplace-mainnet-ollama:11434
      PORT: "8080"
      # Enable LiveOgmiosProvider so submitTx/awaitTx actually broadcast.
      # Mirrors the testnet supplier compose; without this the supplier
      # silently falls back to ReadOnlyOgmiosProvider and Claim/Submit
      # never reach chain.
      LIVE_CHAIN: "1"
      # NETWORK_ID and OGMIOS_URL intentionally not pinned here — they MUST
      # come from the operator-provided supplier/.env on a mainnet host.
      # Setting them via compose would be a footgun: a stray re-up on
      # testnet hardware could silently re-tag the supplier as mainnet.
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/healthz >/dev/null || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - marketplace-mainnet-net
      - traefik-net
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik-net"
      - "traefik.http.routers.mp-suppliers-mainnet.entrypoints=web"
      - "traefik.http.routers.mp-suppliers-mainnet.rule=Host(`mp-suppliers.vector.apexfusion.org`)"
      - "traefik.http.services.mp-suppliers-mainnet.loadbalancer.server.port=8080"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

networks:
  marketplace-mainnet-net:
    external: true
    name: marketplace-mainnet-net
  traefik-net:
    external: true
    name: traefik-net
