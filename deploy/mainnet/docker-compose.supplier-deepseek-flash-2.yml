# deploy/mainnet/docker-compose.supplier-deepseek-flash-2.yml — Supplier — MAINNET (OpenRouter / DeepSeek V4 Flash #2)
#
# Parallel-capacity supplier for deepseek/deepseek-v4-flash via OpenRouter's
# OpenAI-compatible API. Same shape as the kimi replicas; distinct only in
# instance name, container, env file, Traefik host/router, and advert model.
# Shares the same OpenRouter API key as the kimi suppliers (accepted ceiling;
# supplier has no 429/backoff). Advert caps: max_output_tokens=262144,
# max_processing_ms=3600000; OPENAI_TIMEOUT_MS matched.
#
# Pre-flight:
#   1. DNS (proxied): mp-suppliers-deepseek-flash-2.vector.apexfusion.org → host
#   2. supplier/.env.deepseek-flash-2 on host (chmod 600): SUPPLIER_PRIV_KEY_HEX,
#        OPENAI_API_KEY, OGMIOS_URL, NETWORK_ID=1, VECTOR_ZERO_TIME_MS,
#        ESCROW_REF_UTXO, ADVERT_REF_UTXO, ADVERT_REF, LIVE_CHAIN=1
#   3. Networks marketplace-mainnet-net + traefik-net already exist.

name: marketplace-mainnet-supplier-deepseek-flash-2

services:
  supplier:
    build:
      context: ../..
      dockerfile: supplier/Dockerfile
    container_name: marketplace-mainnet-supplier-deepseek-flash-2
    restart: unless-stopped
    env_file:
      - path: ../../supplier/.env.deepseek-flash-2
        required: false
    environment:
      LLM_BACKEND: openai
      # No /v1 suffix — supplier/src/openai.ts appends /v1/chat/completions.
      OPENAI_BASE_URL: https://openrouter.ai/api
      # Matches the advert's max_processing_ms=3600000 (60 min).
      OPENAI_TIMEOUT_MS: "3600000"
      PORT: "8080"
      LIVE_CHAIN: "1"
      # NETWORK_ID and OGMIOS_URL come from supplier/.env.deepseek-flash-2.
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/healthz >/dev/null || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - marketplace-mainnet-net
      - traefik-net
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik-net"
      - "traefik.http.routers.mp-suppliers-deepseek-flash-2-mainnet.entrypoints=web"
      - "traefik.http.routers.mp-suppliers-deepseek-flash-2-mainnet.rule=Host(`mp-suppliers-deepseek-flash-2.vector.apexfusion.org`)"
      - "traefik.http.services.mp-suppliers-deepseek-flash-2-mainnet.loadbalancer.server.port=8080"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

networks:
  marketplace-mainnet-net:
    external: true
    name: marketplace-mainnet-net
  traefik-net:
    external: true
    name: traefik-net
